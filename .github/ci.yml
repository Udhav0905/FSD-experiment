name: FSD Testing CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: Testing/Frontend
        run: npm install

      - name: Run Frontend Tests
        working-directory: Testing/Frontend
        run: npm test || echo "No frontend tests found"


  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Backend Dependencies
        working-directory: Testing/Backend
        run: pip install -r requirements.txt

      - name: Run Backend Tests
        working-directory: Testing/Backend
        run: pytest || echo "No backend tests found"